# DoD Budget CI Workflow
#
# Runs on every push and pull request to main.
# Fast: single pytest run with auto-discovery, lint, type check.

name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop, "claude/**", "refactor/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov mypy pyyaml fpdf2 beautifulsoup4 openpyxl pdfplumber

      - name: Lint with ruff
        run: ruff check . --select=E,W,F --ignore=E501 --exclude=DoD_Budget_Documents

      - name: Type check with mypy
        run: mypy api/ utils/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Run tests
        run: |
          xvfb-run --auto-servernum \
            python -m pytest tests/ \
              --ignore=tests/optimization_validation \
              --cov=api --cov=utils --cov=downloader --cov=pipeline \
              --cov-report=term-missing \
              --cov-fail-under=80 \
              -q --tb=short

      - name: Verify no broken imports
        run: |
          python -c "
          import downloader
          import pipeline
          import utils
          from api.app import create_app
          print('All modules import successfully')
          "

  docker-build:
    name: "Docker Build Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dod-budget-test .

      - name: Validate Docker image imports
        run: |
          docker run --rm dod-budget-test python -c "
          from api.app import create_app
          import downloader
          import pipeline
          print('All Docker imports OK')
          "
