# DoD Budget CI Workflow
#
# Runs on every push and pull request to main.
# Structure:
#   - quality:       lint + type-check (single run, not per-Python)
#   - test:          pytest + coverage, matrix over Python 3.11 / 3.12
#   - docker-build:  validate image builds and imports
#
# Tool configuration lives in pyproject.toml so CLI, CI, and pre-commit
# all use identical rules.

name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop, "claude/**", "refactor/**"]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy
        continue-on-error: true   # informational for now; flip to false once codebase is fully typed

  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        # --cov-fail-under comes from pyproject.toml [tool.coverage.report]
        run: |
          xvfb-run --auto-servernum \
            python -m pytest tests/ \
              --ignore=tests/optimization_validation \
              --cov=api --cov=utils \
              --cov-report=term-missing \
              --cov-report=xml:coverage.xml \
              -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      - name: Verify no broken imports
        run: |
          python -c "
          import downloader
          import pipeline
          import utils
          from api.app import create_app
          print('All modules import successfully')
          "

  docker-build:
    name: "Docker Build Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dod-budget-test .

      - name: Validate Docker image imports
        run: |
          docker run --rm dod-budget-test python -c "
          from api.app import create_app
          import downloader
          import pipeline
          print('All Docker imports OK')
          "
